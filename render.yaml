# Render Blueprint — backend only. The frontend deploys to Vercel (see vercel.json).
#
# IMPORTANT: this service is STATEFUL — sessions and the SSE event bus live in
# process memory (app/api/deps.py singletons). It MUST run as a single,
# always-on instance. Never enable autoscaling and never use the Free plan
# (Free spins down on idle, which wipes every active session + SSE stream).
services:
  - type: web
    name: editor-backend
    runtime: docker
    branch: main
    dockerfilePath: backend/Dockerfile
    dockerContext: .          # repo root — image needs both backend/ and shared/
    plan: standard           # 2GB, always-on. 16-bit RAW develop peaks ~300MB+
                             # per request and OOM'd the 512MB `starter` tier
                             # (mid-response OOM → client ERR_HTTP2_PROTOCOL_ERROR).
    region: frankfurt        # closest Render region to Munich
    numInstances: 1          # in-memory state — do NOT scale past 1
    healthCheckPath: /health
    # Persistent disk for session state + event journals (.sessions/). Render's
    # default filesystem is ephemeral, so WITHOUT this every deploy/restart wipes
    # the study logs. Mounted at /var/editor-sessions; SESSIONS_DIR points here.
    # (A disk pins the service to one instance + stop-start deploys — already the
    # case here.)
    disk:
      name: editor-sessions
      mountPath: /var/editor-sessions
      sizeGB: 2
    # Auto-deploy backend changes on push to main. NOTE: the service is stateful
    # (in-memory sessions + SSE), so a deploy restarts it and drops any active
    # session — fine for the study (each participant starts fresh), and it stops
    # backend fixes from silently lagging behind the Vercel frontend.
    autoDeploy: true
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false          # set in the Render dashboard (secret)
      - key: REPLICATE_API_TOKEN
        sync: false          # set in the Render dashboard (secret) — genfill widget
      - key: BACKEND_AUTH_TOKEN
        generateValue: true  # Render mints a strong shared secret; read it in the dashboard
      - key: ADMIN_TOKEN
        sync: false          # SEPARATE secret for /admin (participant data). NOT the frontend
                             # token. Set in the dashboard; use it in /admin/?token=… (runbook).
      - key: ALLOWED_ORIGINS
        sync: false          # e.g. https://<your-app>.vercel.app,app://bundle
      - key: ANTHROPIC_MODEL
        value: claude-opus-4-7
      - key: SESSIONS_DIR
        value: /var/editor-sessions   # persist session state + logs on the disk above
